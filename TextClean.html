<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>text.clean — Text Processor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg2: #181818;
    --bg3: #222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.16);
    --text: #f0ede6;
    --text2: #888;
    --text3: #555;
    --accent: #c8f56a;
    --accent2: #a4d447;
    --danger: #ff5c5c;
    --add: rgba(200,245,106,0.12);
    --rem: rgba(255,92,92,0.12);
    --add-border: rgba(200,245,106,0.4);
    --rem-border: rgba(255,92,92,0.4);
    --radius: 10px;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  body.light {
    --bg: #f4f1eb;
    --bg2: #ffffff;
    --bg3: #eae6de;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --text2: #666;
    --text3: #aaa;
    --accent: #5a8a00;
    --accent2: #4a7200;
    --danger: #cc2222;
    --add: rgba(90,138,0,0.1);
    --rem: rgba(204,34,34,0.08);
    --add-border: rgba(90,138,0,0.45);
    --rem-border: rgba(204,34,34,0.35);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    transition: background 0.25s, color 0.25s;
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .logo {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text2);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    transition: all 0.2s;
  }

  .mode-toggle:hover { color: var(--text); border-color: var(--accent); }

  /* ── Separator Row ── */
  .sep-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .sep-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .custom-select { position: relative; display: inline-block; }

  .custom-select select {
    appearance: none;
    -webkit-appearance: none;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 34px 7px 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    min-width: 210px;
  }

  .custom-select select:focus { border-color: var(--accent); }
  .custom-select select option { background: var(--bg2); color: var(--text); }

  .chevron {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--text3);
    font-size: 14px;
  }

  .custom-sep-input {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 160px;
  }

  .custom-sep-input:focus { border-color: var(--accent); }
  .custom-sep-input::placeholder { color: var(--text3); }

  .sep-preview {
    font-size: 11px;
    color: var(--text3);
    padding: 4px 10px;
    background: var(--bg3);
    border-radius: 5px;
    white-space: nowrap;
  }

  /* ── Panels ── */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 1rem;
  }

  .panel-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-label .stats {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0;
    text-transform: none;
  }

  textarea {
    width: 100%;
    height: 240px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.65;
    padding: 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }
  .output-panel textarea { color: var(--accent); }

  /* ── File Drop ── */
  .file-drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
    cursor: pointer;
    color: var(--text2);
    font-size: 12px;
    transition: all 0.2s;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .file-drop-zone:hover,
  .file-drop-zone.drag-over {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--add);
  }

  #file-input { display: none; }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: 10px;
    margin: 1.25rem 0;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    color: #0f0f0f;
    border-color: var(--accent);
    font-weight: 500;
  }

  .btn-primary:hover {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #0f0f0f;
  }

  .btn-ghost { border-color: transparent; color: var(--text2); }
  .btn-ghost:hover { color: var(--danger); border-color: var(--danger); }

  .copy-btn { margin-left: auto; }

  /* ── Stats Bar ── */
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 1.25rem;
    padding: 12px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    flex-wrap: wrap;
  }

  .stat-item { display: flex; flex-direction: column; gap: 3px; }

  .stat-val {
    font-family: var(--display);
    font-weight: 700;
    font-size: 20px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-lbl {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .stat-divider { width: 1px; background: var(--border); align-self: stretch; }

  /* ── Diff Section ── */
  .diff-section { margin-top: 1rem; }

  .diff-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .diff-title {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  .diff-legend { display: flex; gap: 12px; margin-left: auto; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text2);
  }

  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .legend-dot.add { background: var(--accent); opacity: 0.6; }
  .legend-dot.rem { background: var(--danger); opacity: 0.6; }

  .diff-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .diff-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    min-height: 140px;
    font-size: 13px;
    line-height: 1.7;
    font-family: var(--mono);
    white-space: pre-wrap;
    word-break: break-word;
    overflow-y: auto;
    max-height: 300px;
    color: var(--text2);
  }

  .diff-box .kept   { color: var(--text); }
  .diff-box .added  { background: var(--add); color: var(--accent); border-radius: 2px; padding: 0 2px; border-left: 2px solid var(--add-border); }
  .diff-box .removed{ background: var(--rem); color: var(--danger);  border-radius: 2px; padding: 0 2px; border-left: 2px solid var(--rem-border); text-decoration: line-through; opacity: 0.7; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--accent);
    color: #0f0f0f;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 6px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 9999;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 620px) {
    .panels, .diff-panels { grid-template-columns: 1fr; }
    .btn-row { flex-direction: column; }
    .copy-btn { margin-left: 0; }
    .sep-row { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="logo">text<span>.</span>clean</div>
    <button class="mode-toggle" onclick="toggleMode()" id="modeBtn">
      <i class="ti ti-sun" aria-hidden="true"></i> light mode
    </button>
  </div>

  <!-- Separator Row -->
  <div class="sep-row">
    <span class="sep-label">paragraph separator</span>
    <div class="custom-select">
      <select id="sepSelect" onchange="onSepChange()">
        <option value="nn">single empty line (\n\n)</option>
        <option value="n">single newline (\n)</option>
        <option value="dash">dash line (---)</option>
        <option value="pipe">pipe symbol ( | )</option>
        <option value="custom">custom...</option>
      </select>
      <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
    </div>
    <input
      class="custom-sep-input"
      id="customSepInput"
      type="text"
      placeholder="type separator..."
      style="display:none"
      oninput="updatePreview()"
    />
    <span class="sep-preview" id="sepPreview">\n\n between paragraphs</span>
  </div>

  <!-- Input / Output Panels -->
  <div class="panels">
    <div>
      <div class="panel-label">
        <span>input</span>
        <span class="stats" id="inStats">0 words · 0 chars</span>
      </div>
      <textarea
        id="inputBox"
        placeholder="Paste or type your messy text here..."
        oninput="updateStats()"
      ></textarea>
      <div class="file-drop-zone" id="dropZone" onclick="document.getElementById('file-input').click()">
        <i class="ti ti-upload" aria-hidden="true" style="font-size:15px"></i>
        drop .txt file or click to browse
      </div>
      <input type="file" id="file-input" accept=".txt" onchange="loadFile(event)" />
    </div>

    <div class="output-panel">
      <div class="panel-label">
        <span>output</span>
        <span class="stats" id="outStats">—</span>
      </div>
      <textarea id="outputBox" placeholder="Processed text will appear here..." readonly></textarea>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" onclick="processText()">
      <i class="ti ti-bolt" aria-hidden="true"></i> process
    </button>
    <button class="btn" onclick="showDiff()" id="diffBtn" style="display:none">
      <i class="ti ti-git-diff" aria-hidden="true"></i> diff view
    </button>
    <button class="btn btn-ghost" onclick="clearAll()">
      <i class="ti ti-trash" aria-hidden="true"></i> clear
    </button>
    <button class="btn copy-btn" id="copyBtn" onclick="copyOutput()" style="display:none">
      <i class="ti ti-copy" aria-hidden="true"></i> copy output
    </button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-item">
      <span class="stat-val" id="sw">0</span>
      <span class="stat-lbl">words in</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-val" id="ow">0</span>
      <span class="stat-lbl">words out</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-val" id="sc">0</span>
      <span class="stat-lbl">chars in</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-val" id="oc">0</span>
      <span class="stat-lbl">chars out</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-val" id="linesRem">0</span>
      <span class="stat-lbl">lines removed</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-val" id="reduction">0%</span>
      <span class="stat-lbl">size reduction</span>
    </div>
  </div>

  <!-- Diff Section -->
  <div class="diff-section" id="diffSection" style="display:none">
    <div class="diff-header">
      <span class="diff-title">side-by-side diff</span>
      <div class="diff-legend">
        <div class="legend-item"><div class="legend-dot rem"></div> removed</div>
        <div class="legend-item"><div class="legend-dot add"></div> kept / added</div>
      </div>
    </div>
    <div class="diff-panels">
      <div>
        <div class="panel-label">before</div>
        <div class="diff-box" id="diffBefore"></div>
      </div>
      <div>
        <div class="panel-label">after</div>
        <div class="diff-box" id="diffAfter"></div>
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  /* ── Separator helpers ── */
  const SEP_MAP = {
    nn:     '\n\n',
    n:      '\n',
    dash:   '\n---\n',
    pipe:   ' | ',
    custom: ''
  };

  const PREVIEW_MAP = {
    nn:     '\\n\\n between paragraphs',
    n:      '\\n between paragraphs',
    dash:   '--- between paragraphs',
    pipe:   ' | between paragraphs',
    custom: ''
  };

  function getSeparator() {
    const v = document.getElementById('sepSelect').value;
    if (v === 'custom') {
      return document.getElementById('customSepInput').value.replace(/\\n/g, '\n');
    }
    return SEP_MAP[v];
  }

  function onSepChange() {
    const v  = document.getElementById('sepSelect').value;
    const ci = document.getElementById('customSepInput');
    const pr = document.getElementById('sepPreview');
    if (v === 'custom') {
      ci.style.display = 'inline-block';
      pr.textContent   = ci.value ? '"' + ci.value + '" between paragraphs' : 'type your separator';
    } else {
      ci.style.display = 'none';
      pr.textContent   = PREVIEW_MAP[v];
    }
  }

  function updatePreview() {
    const v = document.getElementById('customSepInput').value;
    document.getElementById('sepPreview').textContent =
      v ? '"' + v + '" between paragraphs' : 'type your separator';
  }

  /* ── Stats ── */
  function countWords(t) {
    return t.trim() === '' ? 0 : t.trim().split(/\s+/).length;
  }

  function updateStats() {
    const t = document.getElementById('inputBox').value;
    document.getElementById('inStats').textContent =
      countWords(t) + ' words · ' + t.length + ' chars';
  }

  /* ── Core processing ── */
  function processText() {
    const input = document.getElementById('inputBox').value;
    if (!input.trim()) { showToast('nothing to process'); return; }

    const sep   = getSeparator();
    const lines = input.split('\n');
    const paragraphs = [];
    let   para  = [];

    for (let i = 0; i < lines.length; i++) {
      const raw     = lines[i];
      const stripped = raw.replace(/\s+/g, ' ').trim();

      // Empty line = paragraph boundary
      if (stripped === '') {
        if (para.length > 0) { paragraphs.push(para.join(' ')); para = []; }
        continue;
      }

      para.push(stripped);

      const isEnd       = /[.?!…]$/.test(stripped);
      const nextBlank   = (i + 1 < lines.length) && lines[i + 1].trim() === '';
      const nextIndent  = (i + 1 < lines.length) &&
                          (lines[i + 1].length - lines[i + 1].trimStart().length) > 4;

      // End of sentence followed by blank / heavy-indent = paragraph boundary
      if (isEnd && (nextBlank || nextIndent)) {
        paragraphs.push(para.join(' '));
        para = [];
      }
    }

    if (para.length > 0) paragraphs.push(para.join(' '));

    const output = paragraphs.filter(p => p.trim() !== '').join(sep).trim();
    document.getElementById('outputBox').value = output;

    // Compute stats
    const inW  = countWords(input),  outW = countWords(output);
    const inC  = input.length,        outC = output.length;
    const linesIn  = input.split('\n').length;
    const linesOut = output.split('\n').length;
    const linesRemoved = Math.max(0, linesIn - linesOut);
    const reduction    = inC > 0 ? Math.max(0, Math.round((1 - outC / inC) * 100)) : 0;

    document.getElementById('sw').textContent       = inW;
    document.getElementById('ow').textContent       = outW;
    document.getElementById('sc').textContent       = inC;
    document.getElementById('oc').textContent       = outC;
    document.getElementById('linesRem').textContent = linesRemoved;
    document.getElementById('reduction').textContent= reduction + '%';
    document.getElementById('outStats').textContent = outW + ' words · ' + outC + ' chars';

    document.getElementById('statsBar').style.display  = 'flex';
    document.getElementById('copyBtn').style.display   = 'flex';
    document.getElementById('diffBtn').style.display   = 'flex';
    document.getElementById('diffSection').style.display = 'none';
  }

  /* ── Diff view ── */
  function showDiff() {
    const input  = document.getElementById('inputBox').value;
    const output = document.getElementById('outputBox').value;
    if (!output) return;

    const inLines  = input.split('\n');
    const outLines = output.split('\n');
    const outJoined = outLines.join(' ');

    let beforeHtml = '', afterHtml = '';

    inLines.forEach(line => {
      const stripped = line.replace(/\s+/g, ' ').trim();
      if (line.trim() === '') {
        beforeHtml += '<span class="removed">[blank line]</span>\n';
      } else if (stripped) {
        const found = outJoined.includes(stripped);
        beforeHtml += (found
          ? '<span class="kept">'    + escHtml(stripped) + '</span>'
          : '<span class="removed">' + escHtml(stripped) + '</span>') + '\n';
      }
    });

    outLines.forEach(line => {
      afterHtml += line.trim() === ''
        ? '\n'
        : '<span class="added">' + escHtml(line) + '</span>\n';
    });

    document.getElementById('diffBefore').innerHTML = beforeHtml;
    document.getElementById('diffAfter').innerHTML  = afterHtml;
    document.getElementById('diffSection').style.display = 'block';
    document.getElementById('diffSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Copy ── */
  function copyOutput() {
    const out = document.getElementById('outputBox').value;
    if (!out) { showToast('nothing to copy'); return; }
    navigator.clipboard.writeText(out)
      .then(() => showToast('copied to clipboard ✓'))
      .catch(() => {
        /* Fallback for environments without clipboard API */
        document.getElementById('outputBox').select();
        document.execCommand('copy');
        showToast('copied to clipboard ✓');
      });
  }

  /* ── Clear ── */
  function clearAll() {
    document.getElementById('inputBox').value  = '';
    document.getElementById('outputBox').value = '';
    document.getElementById('inStats').textContent  = '0 words · 0 chars';
    document.getElementById('outStats').textContent = '—';
    document.getElementById('statsBar').style.display   = 'none';
    document.getElementById('copyBtn').style.display    = 'none';
    document.getElementById('diffBtn').style.display    = 'none';
    document.getElementById('diffSection').style.display = 'none';
  }

  /* ── File Upload ── */
  function loadFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('inputBox').value = ev.target.result;
      updateStats();
      showToast('loaded: ' + file.name);
    };
    reader.readAsText(file);
    e.target.value = '';   // allow re-uploading same file
  }

  /* ── Drag & Drop ── */
  const dropZone = document.getElementById('dropZone');

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.txt')) {
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('inputBox').value = ev.target.result;
        updateStats();
        showToast('loaded: ' + file.name);
      };
      reader.readAsText(file);
    } else {
      showToast('please drop a .txt file');
    }
  });

  /* ── Toast ── */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  /* ── Dark / Light toggle ── */
  let isLight = false;

  function toggleMode() {
    isLight = !isLight;
    document.body.classList.toggle('light', isLight);
    document.getElementById('modeBtn').innerHTML = isLight
      ? '<i class="ti ti-moon" aria-hidden="true"></i> dark mode'
      : '<i class="ti ti-sun"  aria-hidden="true"></i> light mode';
  }
</script>
</body>
</html>
